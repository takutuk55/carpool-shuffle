<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚗 ワクワク乗り合いシャッフル！</title>
    <!-- Google Fonts: Nunito & Zen Maru Gothic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --sky-blue: #A1C4FD;
            --sky-light: #C2E9FB;
            --accent-pink: #FF8FAB;
            --accent-pink-hover: #FF7A9A;
            --accent-orange: #FFB347;
            --card-bg: #FFFFFF;
            --text-main: #4A4A4A;
            --border-light: #FFE8E8;
            --shadow: 0 8px 25px rgba(0, 0, 0, 0.05);
            --shadow-btn: 0 5px 0 #E07A92;
            --radius-main: 28px;
            --radius-input: 16px;
            --radius-btn: 50px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Zen Maru Gothic', 'Nunito', sans-serif;
            background: linear-gradient(180deg, var(--sky-blue) 0%, var(--sky-light) 100%);
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px 15px; /* スマホ用に左右余白を少し縮小 */
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden; /* 横スクロールを完全に禁止 */
        }

        /* --- 雲の背景 --- */
        .cloud-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
        }

        .cloud {
            position: absolute;
            background: white;
            width: 180px;
            height: 50px;
            border-radius: 100px;
            opacity: 0.7;
            animation: moveClouds linear infinite;
        }

        .cloud::after, .cloud::before {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }

        .cloud::after { width: 80px; height: 80px; top: -40px; left: 25px; }
        .cloud::before { width: 100px; height: 100px; top: -60px; left: 60px; }

        @keyframes moveClouds {
            from { transform: translateX(-350px); }
            to { transform: translateX(calc(100vw + 350px)); }
        }

        /* --- メインUI --- */
        .container {
            max-width: 850px;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: var(--radius-main);
            padding: 40px 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
            border: 1px solid rgba(255,255,255,0.7);
            margin-top: 20px;
            position: relative;
            z-index: 10;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        h1 {
            font-weight: 900;
            font-size: 2.2rem;
            color: var(--accent-pink);
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            text-shadow: 2px 2px 0 rgba(255,255,255,0.8);
            word-break: keep-all; /* モバイルでの不自然な改行を防止 */
        }

        .subtitle {
            font-size: 0.95rem;
            color: #7AA8DB;
            font-weight: 900;
        }

        section {
            background: var(--card-bg);
            border: 2px solid var(--border-light);
            border-radius: var(--radius-main);
            padding: 24px;
            margin-bottom: 25px;
            box-shadow: var(--shadow);
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #5D95D1;
        }

        .member-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .member-item {
            display: flex;
            gap: 10px;
        }

        input {
            padding: 12px 18px;
            border: 2.5px solid #F0F7FF;
            border-radius: var(--radius-input);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
            color: var(--text-main);
            width: 100%; /* 全てのインプットをデフォルトで幅いっぱいに */
        }

        input[type="text"] {
            flex: 1;
            background: #FAFDFF;
        }

        input:focus {
            border-color: var(--sky-blue);
            background: #FFF;
            box-shadow: 0 0 0 4px rgba(161, 196, 253, 0.12);
        }

        .btn-remove {
            background: #FFF;
            border: 2px solid #EEE;
            color: #DDD;
            width: 48px;
            min-width: 48px; /* スマホで潰れないように固定 */
            height: 48px;
            border-radius: var(--radius-input);
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .btn-remove:hover {
            background: #FFF0F0;
            border-color: #FFDADA;
            color: var(--accent-pink);
        }

        .btn-add {
            margin-top: 15px;
            background: white;
            border: 3px dashed #A1C4FD;
            color: #A1C4FD;
            padding: 14px;
            border-radius: var(--radius-input);
            cursor: pointer;
            width: 100%;
            font-weight: 900;
            transition: 0.2s;
        }

        .car-count-ctrl {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            background: #F0F7FF;
            padding: 15px 20px;
            border-radius: 20px;
            flex-wrap: wrap; /* スマホで入り切らない場合を考慮 */
            gap: 10px;
        }

        .num-stepper {
            display: flex;
            align-items: center;
            background: white;
            border-radius: 12px;
            border: 2px solid #E0EFFF;
        }

        .num-stepper button {
            background: none;
            border: none;
            padding: 8px 18px;
            font-size: 1.3rem;
            cursor: pointer;
            color: #A1C4FD;
            font-weight: 900;
        }

        .num-stepper input {
            width: 50px;
            border: none;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 900;
            background: transparent;
        }

        .car-names-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .car-setting-row {
            display: flex;
            gap: 10px;
            align-items: center;
            background: #FFF;
            padding: 10px;
            border-radius: 18px;
            border: 2px solid #F0F7FF;
        }

        .capacity-box {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #F0F7FF;
            padding: 6px 10px;
            border-radius: 12px;
            font-weight: 700;
            color: #5D95D1;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .car-capacity-input {
            width: 50px !important;
            padding: 6px !important;
            text-align: center;
            font-weight: 900;
            border-width: 2px;
        }

        .action-area {
            text-align: center;
            margin: 40px 0;
        }

        .btn-shuffle {
            background: var(--accent-pink);
            color: white;
            border: none;
            padding: 20px 60px;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: var(--radius-btn);
            cursor: pointer;
            box-shadow: var(--shadow-btn);
            transition: all 0.2s;
            width: 100%; /* スマホなら幅いっぱいに */
            max-width: 400px;
        }

        .btn-shuffle:active {
            transform: translateY(2px);
            box-shadow: none;
        }

        #results-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .result-card {
            background: white;
            border-radius: 24px;
            padding: 22px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 2px solid #F0F7FF;
            animation: popIn 0.5s ease-out;
        }

        @keyframes popIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .member-tag {
            display: inline-block;
            background: #F3F9FF;
            color: #5D95D1;
            padding: 7px 16px;
            border-radius: 50px;
            font-weight: 900;
            margin: 4px;
            border: 1.5px solid #E0EFFF;
            font-size: 0.9rem;
            word-break: break-all; /* 長い名前のはみ出し防止 */
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            color: #ABC;
            padding: 50px 20px;
            font-weight: 900;
            border: 3px dashed #CFE5FF;
            border-radius: 25px;
            font-size: 0.9rem;
        }

        /* --- モバイル専用の詳細調整 --- */
        @media (max-width: 600px) {
            h1 { font-size: 1.6rem; }
            .container { padding: 30px 18px; border-radius: 24px; }
            section { padding: 18px; border-radius: 22px; }
            h2 { font-size: 1.1rem; }
            .car-setting-row {
                flex-direction: column;
                align-items: stretch;
                padding: 12px;
            }
            .capacity-box {
                align-self: flex-end; /* 定員入力は右寄せで収まりを良くする */
            }
            .btn-shuffle {
                padding: 16px;
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

    <div class="cloud-bg">
        <div class="cloud" style="top: 5%; left: 0%; animation-duration: 35s;"></div>
        <div class="cloud" style="top: 25%; left: 0%; animation-duration: 45s; transform: scale(0.8); opacity: 0.8;"></div>
        <div class="cloud" style="top: 45%; left: 0%; animation-duration: 30s; transform: scale(1.2); opacity: 0.6;"></div>
        <div class="cloud" style="top: 70%; left: 0%; animation-duration: 50s; transform: scale(0.7); opacity: 0.9;"></div>
    </div>

    <div class="container">
        <header>
            <h1>🚗 ワクワク乗り合いシャッフル！</h1>
            <div class="subtitle">✨ みんなでお出かけ・ワクワク気分 ✨</div>
        </header>

        <section>
            <h2>👤 STEP 1: メンバーを入力</h2>
            <div id="member-inputs" class="member-list"></div>
            <button class="btn-add" onclick="addMember()">+ 新しいメンバーを増やす</button>
        </section>

        <section>
            <h2>🛞 STEP 2: 車の台数・名前</h2>
            <div class="car-count-ctrl">
                <span>今の車の台数：</span>
                <div class="num-stepper">
                    <button onclick="updateCars(-1)">-</button>
                    <input type="number" id="car-count" value="2" readonly>
                    <button onclick="updateCars(1)">+</button>
                </div>
            </div>
            <div id="car-names-container" class="car-names-grid"></div>
        </section>

        <div class="action-area">
            <button id="shuffle-btn" class="btn-shuffle" onclick="handleShuffle()">🎲 シャッフル！</button>
        </div>

        <div id="results-container">
            <div class="empty-state">まだ誰も乗っていないよ... 🎲</div>
        </div>
    </div>

    <script>
        let memberId = 0;
        let carCount = 2;
        const examples = ["田中さん", "佐藤さん", "鈴木さん", "高橋さん", "中村さん", "山本さん"];

        window.addEventListener('DOMContentLoaded', () => {
            for(let i=0; i<4; i++) addMember();
            renderCars();
        });

        function addMember() {
            memberId++;
            const ex = examples[Math.floor(Math.random() * examples.length)];
            const div = document.createElement('div');
            div.className = 'member-item';
            div.innerHTML = `<input type="text" class="name-in" placeholder="例：${ex}" autocomplete="off"><button class="btn-remove" onclick="this.parentElement.remove()">✕</button>`;
            document.getElementById('member-inputs').appendChild(div);
        }

        function updateCars(v) {
            const n = carCount + v;
            if(n >= 1 && n <= 10) {
                carCount = n;
                document.getElementById('car-count').value = carCount;
                renderCars();
            }
        }

        function renderCars() {
            const container = document.getElementById('car-names-container');
            const current = Array.from(container.querySelectorAll('.car-setting-row'));
            const saved = current.map(r => ({
                name: r.querySelector('.car-name').value,
                cap: r.querySelector('.car-cap').value
            }));
            container.innerHTML = '';
            for(let i=1; i<=carCount; i++) {
                const data = saved[i-1] || { name: `${i}号車`, cap: 4 };
                const div = document.createElement('div');
                div.className = 'car-setting-row';
                div.innerHTML = `
                    <input type="text" class="car-name" value="${data.name}" placeholder="${i}号車">
                    <div class="capacity-box">
                        <span>定員</span>
                        <input type="number" class="car-cap car-capacity-input" value="${data.cap}" min="1">
                        <span>人</span>
                    </div>`;
                container.appendChild(div);
            }
        }

        function handleShuffle() {
            const names = Array.from(document.querySelectorAll('.name-in'))
                .map(i => i.value.trim()).filter(v => v !== "");
            if(names.length < 2) { alert("2人以上入力してね！"); return; }

            const cars = Array.from(document.querySelectorAll('.car-setting-row')).map((r, idx) => ({
                name: r.querySelector('.car-name').value.trim() || `${idx+1}号車`,
                cap: parseInt(r.querySelector('.car-cap').value) || 1
            }));

            const totalCap = cars.reduce((s, c) => s + c.cap, 0);
            if(totalCap < names.length) {
                alert(`⚠️ お空の席が足りないよ！\nあと ${names.length - totalCap}人分増やしてね🚗`);
                return;
            }

            const btn = document.getElementById('shuffle-btn');
            const originalText = btn.innerText;
            btn.innerText = "✨ シャッフル中... ✨";

            setTimeout(() => {
                let shuffled = [...names].sort(() => Math.random() - 0.5);
                const results = cars.map(() => []);
                let avail = cars.map((_, i) => i);

                shuffled.forEach(m => {
                    const idx = avail[Math.floor(Math.random() * avail.length)];
                    results[idx].push(m);
                    if(results[idx].length >= cars[idx].cap) avail = avail.filter(v => v !== idx);
                });

                const container = document.getElementById('results-container');
                container.innerHTML = '';
                results.forEach((bin, i) => {
                    if(bin.length === 0) return;
                    const card = document.createElement('div');
                    card.className = 'result-card';
                    card.innerHTML = `<h3>🚗 ${cars[i].name}</h3><div class="result-tags">${bin.map(m => `<span class="member-tag">${m}</span>`).join('')}</div>`;
                    container.appendChild(card);
                });

                btn.innerText = originalText;
                container.scrollIntoView({ behavior: 'smooth' });
            }, 800);
        }
    </script>
</body>
</html>
